---
- name: Configure macOS
  hosts: localhost
  roles:
    - { role: folder_tree }
    - { role: macos_settings }
    - { role: zsh }
    - { role: fonts }
    - { role: dotfiles }
    - { role: secrets,  when: profile == 'personal' }
    - { role: projects, when: profile == 'personal' }
    - { role: clean_up }
